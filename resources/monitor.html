<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRad-II HV Monitor</title>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:          #0b0e14;
    --bg-card:     #111820;
    --bg-card-alt: #151d28;
    --bg-hover:    #1a2433;
    --border:      #1e2a3a;
    --border-hi:   #2a3a4e;
    --text:        #c8d3df;
    --text-dim:    #6b7b8f;
    --text-bright: #e8edf3;
    --accent:      #3b9eff;
    --accent-dim:  #1d4d80;
    --green:       #2dd4a0;
    --green-dim:   #0f3d30;
    --red:         #f56565;
    --red-dim:     #4a1a1a;
    --amber:       #eab308;
    --amber-dim:   #3d3008;
    --mono:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    --sans:        'Segoe UI', 'SF Pro Text', system-ui, -apple-system, sans-serif;
    --radius:      6px;
    --transition:  150ms ease;
}

html, body {
    height: 100%;
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
}

/* ─── Layout ──────────────────────────────────────────────────────── */
#app {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 100vh;
}

/* ─── Header ──────────────────────────────────────────────────────── */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
}
header .logo { display: flex; align-items: center; gap: 10px; }
header .logo svg { flex-shrink: 0; }
header .logo h1 { font-size: 15px; font-weight: 600; color: var(--text-bright); letter-spacing: 0.02em; }
header .logo .tag {
    font-family: var(--mono); font-size: 10px; color: var(--accent);
    background: var(--accent-dim); padding: 2px 7px; border-radius: 3px;
    letter-spacing: 0.06em; text-transform: uppercase;
}
header .controls { display: flex; align-items: center; gap: 12px; }
header .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--mono);
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
}
header .status-pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
header .status-pill.disconnected .dot { background: var(--red); animation: none; }

.btn {
    font-family: var(--mono); font-size: 11px;
    background: var(--bg-card-alt); color: var(--text);
    border: 1px solid var(--border); padding: 5px 12px;
    border-radius: var(--radius); cursor: pointer;
    transition: all var(--transition); letter-spacing: 0.02em;
}
.btn:hover { background: var(--bg-hover); border-color: var(--border-hi); color: var(--text-bright); }
.btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ─── Tabs ────────────────────────────────────────────────────────── */
#tab-bar {
    display: flex; gap: 0; background: var(--bg-card); border-bottom: 1px solid var(--border);
}
.tab-btn {
    font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.04em;
    padding: 9px 24px; background: transparent; color: var(--text-dim);
    border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: all var(--transition); text-transform: uppercase;
}
.tab-btn:hover { color: var(--text); background: var(--bg-card-alt); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg-card-alt); }

.tab-content { display: none; overflow: hidden; min-height: 0; grid-row: 3; grid-column: 1; }
.tab-content.active { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

/* ─── Summary Strip ───────────────────────────────────────────────── */
#summary-strip { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
.summary-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 0; background:var(--bg-card); }
.summary-item .label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-dim); margin-bottom:3px; }
.summary-item .value { font-family:var(--mono); font-size:20px; font-weight:600; color:var(--text-bright); }
.summary-item .value.green{color:var(--green)} .summary-item .value.red{color:var(--red)}
.summary-item .value.amber{color:var(--amber)} .summary-item .value.accent{color:var(--accent)}

/* ─── Filter / Search Bar ─────────────────────────────────────────── */
#filter-bar { display:flex; align-items:center; gap:8px; padding:8px 20px; background:var(--bg-card); border-bottom:1px solid var(--border); }
#search {
    flex:0 0 260px; font-family:var(--mono); font-size:12px;
    background:var(--bg); color:var(--text-bright); border:1px solid var(--border);
    padding:6px 10px 6px 30px; border-radius:var(--radius); outline:none; transition:border var(--transition);
}
#search:focus { border-color:var(--accent); }
#filter-bar .search-wrap { position:relative; flex:0 0 260px; }
#filter-bar .search-wrap svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--text-dim); }
.chip-group { display:flex; gap:4px; margin-left:8px; }
.chip {
    font-family:var(--mono); font-size:10.5px; padding:4px 10px;
    border-radius:20px; border:1px solid var(--border); background:transparent;
    color:var(--text-dim); cursor:pointer; transition:all var(--transition);
}
.chip:hover { color:var(--text); border-color:var(--border-hi); }
.chip.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
.chip.active.on-chip { background:var(--green-dim); border-color:var(--green); color:var(--green); }
.chip.active.off-chip { background:var(--red-dim); border-color:var(--red); color:var(--red); }
#filter-bar .spacer { flex:1; }
#poll-label { font-size:10.5px; color:var(--text-dim); font-family:var(--mono); }
#poll-slider {
    -webkit-appearance:none; width:80px; height:4px; background:var(--border);
    border-radius:2px; outline:none; cursor:pointer;
}
#poll-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--accent); cursor:pointer;
}

/* ─── Channel Table ───────────────────────────────────────────────── */
#table-wrap { overflow-y:auto; overflow-x:hidden; flex:1; min-height:0; }
#table-wrap::-webkit-scrollbar { width:6px; }
#table-wrap::-webkit-scrollbar-track { background:transparent; }
#table-wrap::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:3px; }
table { width:100%; border-collapse:collapse; table-layout:fixed; }
thead { position:sticky; top:0; z-index:2; }
thead th {
    font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--text-dim); background:var(--bg-card-alt); border-bottom:1px solid var(--border);
    padding:8px 12px; text-align:left; cursor:pointer; user-select:none; white-space:nowrap;
    transition:color var(--transition);
}
thead th:hover { color:var(--text); }
thead th .sort-arrow { display:inline-block; margin-left:3px; opacity:0.3; font-size:9px; }
thead th.sorted .sort-arrow { opacity:1; color:var(--accent); }
th:nth-child(1),td:nth-child(1){width:4%;text-align:center}
th:nth-child(2),td:nth-child(2){width:14%}
th:nth-child(3),td:nth-child(3){width:7%}
th:nth-child(4),td:nth-child(4){width:7%}
th:nth-child(5),td:nth-child(5){width:10%}
th:nth-child(6),td:nth-child(6){width:18%}
th:nth-child(7),td:nth-child(7){width:12%;text-align:right}
th:nth-child(8),td:nth-child(8){width:12%;text-align:right}
th:nth-child(9),td:nth-child(9){width:10%;text-align:right}
th:nth-child(10),td:nth-child(10){width:6%;text-align:center}
tbody tr { border-bottom:1px solid var(--border); transition:background var(--transition); }
tbody tr:hover { background:var(--bg-hover); }
tbody td { font-family:var(--mono); font-size:12px; padding:6px 12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
td .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; }
td .status-dot.on { background:var(--green); box-shadow:0 0 6px var(--green); }
td .status-dot.off { background:var(--red); opacity:0.5; }
.diff-ok{color:var(--green)} .diff-warn{color:var(--amber)} .diff-bad{color:var(--red)}
.pwr-btn {
    font-family:var(--mono); font-size:10px; padding:2px 8px;
    border-radius:3px; border:1px solid; cursor:pointer; transition:all var(--transition);
}
.pwr-btn.on{color:var(--green);border-color:var(--green-dim);background:var(--green-dim)}
.pwr-btn.off{color:var(--red);border-color:var(--red-dim);background:var(--red-dim)}
.pwr-btn:hover { filter:brightness(1.25); }

/* ─── Footer ──────────────────────────────────────────────────────── */
footer {
    grid-row: 4;
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 20px; font-size:10.5px; font-family:var(--mono);
    color:var(--text-dim); background:var(--bg-card); border-top:1px solid var(--border);
}
footer #last-update::before {
    content:''; display:inline-block; width:5px; height:5px;
    border-radius:50%; background:var(--accent); margin-right:6px; vertical-align:middle;
}

/* ─── Loading overlay ─────────────────────────────────────────────── */
#loading {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:var(--bg); z-index:100;
    transition:opacity 0.4s ease;
}
#loading.hidden { opacity:0; pointer-events:none; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
#loading p { margin-top:14px; font-family:var(--mono); font-size:12px; color:var(--text-dim); }

/* ═══════════════════════════════════════════════════════════════════
   GEOMETRY MAP TAB
   ═══════════════════════════════════════════════════════════════════ */
#geo-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    min-height: 0;
}

#geo-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

#geo-toolbar label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
}

#geo-toolbar select {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg);
    color: var(--text-bright);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
}
#geo-toolbar select:focus { border-color: var(--accent); }

#geo-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: 16px;
}
#geo-legend .leg-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
#geo-legend .leg-bar {
    width: 180px; height: 10px; border-radius: 3px;
    border: 1px solid var(--border);
}

#geo-search {
    font-family: var(--mono); font-size: 11px;
    background: var(--bg); color: var(--text-bright);
    border: 1px solid var(--border);
    padding: 4px 8px; border-radius: var(--radius); outline: none; width: 140px;
}
#geo-search:focus { border-color: var(--accent); }

#geo-canvas-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: grab;
    min-height: 0;
    background:
        radial-gradient(circle at 50% 50%, #111820 0%, #0b0e14 100%);
}
#geo-canvas-wrap:active { cursor: grabbing; }

#geo-canvas {
    position: absolute;
    top: 0; left: 0;
    /* GPU acceleration */
    will-change: transform;
}

/* Module tooltip */
#geo-tooltip {
    position: fixed;
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--border-hi);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    line-height: 1.6;
    min-width: 180px;
}
#geo-tooltip .tt-name { font-size: 13px; font-weight: 600; color: var(--text-bright); }
#geo-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }
#geo-tooltip .tt-label { color: var(--text-dim); }
#geo-tooltip .tt-val { color: var(--text-bright); }
#geo-tooltip .tt-on { color: var(--green); }
#geo-tooltip .tt-off { color: var(--red); }

/* Module popup / modal */
#mod-popup-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center; z-index: 200;
}
#mod-popup-overlay.visible { display: flex; }

#mod-popup {
    background: var(--bg-card);
    border: 1px solid var(--border-hi);
    border-radius: 10px;
    padding: 24px 28px;
    min-width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    font-family: var(--mono);
}

#mod-popup .popup-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
#mod-popup .popup-header h2 {
    font-size: 16px; font-weight: 600; color: var(--text-bright);
}
#mod-popup .popup-close {
    background: none; border: none; color: var(--text-dim); font-size: 18px;
    cursor: pointer; padding: 0 4px; transition: color var(--transition);
}
#mod-popup .popup-close:hover { color: var(--text-bright); }

#mod-popup .popup-grid {
    display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; margin-bottom: 18px;
}
#mod-popup .popup-grid .plbl { color: var(--text-dim); font-size: 11px; }
#mod-popup .popup-grid .pval { color: var(--text-bright); font-size: 12px; }

#mod-popup .popup-actions {
    display: flex; gap: 10px; align-items: center;
}
#mod-popup .popup-actions input[type=number] {
    font-family: var(--mono); font-size: 12px;
    background: var(--bg); color: var(--text-bright);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px 8px; width: 100px; outline: none;
}
#mod-popup .popup-actions input[type=number]:focus { border-color: var(--accent); }

.btn-sm {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 14px; border-radius: var(--radius);
    border: 1px solid; cursor: pointer; transition: all var(--transition);
}
.btn-set { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-dim); }
.btn-set:hover { background: var(--accent); color: #fff; }
.btn-on { color: var(--green); border-color: var(--green-dim); background: var(--green-dim); }
.btn-on:hover { background: var(--green); color: #000; }
.btn-off { color: var(--red); border-color: var(--red-dim); background: var(--red-dim); }
.btn-off:hover { background: var(--red); color: #fff; }
</style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>Connecting to HV crates…</p>
</div>

<!-- Tooltip for geometry map -->
<div id="geo-tooltip"></div>

<!-- Module popup modal -->
<div id="mod-popup-overlay">
    <div id="mod-popup">
        <div class="popup-header">
            <h2 id="popup-title">—</h2>
            <button class="popup-close" id="popup-close">✕</button>
        </div>
        <div class="popup-grid" id="popup-grid"></div>
        <div class="popup-actions">
            <input type="number" id="popup-vset" step="0.1" placeholder="VSet (V)">
            <button class="btn-sm btn-set" id="popup-set-v">Set V</button>
            <button class="btn-sm btn-on" id="popup-turn-on">ON</button>
            <button class="btn-sm btn-off" id="popup-turn-off">OFF</button>
        </div>
    </div>
</div>

<div id="app">

    <!-- Header -->
    <header>
        <div class="logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b9eff"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            <h1>PRad-II HV Monitor</h1>
            <span class="tag">CAEN SY1527</span>
        </div>
        <div class="controls">
            <div class="status-pill" id="conn-pill">
                <span class="dot"></span>
                <span id="conn-text">connecting</span>
            </div>
            <button class="btn" id="btn-refresh" title="Force refresh now">↻ Refresh</button>
        </div>
    </header>

    <!-- Tab bar -->
    <div id="tab-bar">
        <button class="tab-btn active" data-tab="table-tab">Channel Table</button>
        <button class="tab-btn" data-tab="geo-tab">HyCal Geometry</button>
    </div>

    <!-- ═══════════════ TABLE TAB ═══════════════ -->
    <div class="tab-content active" id="table-tab">
        <div id="summary-strip">
            <div class="summary-item"><span class="label">Total Channels</span><span class="value accent" id="s-total">—</span></div>
            <div class="summary-item"><span class="label">ON</span><span class="value green" id="s-on">—</span></div>
            <div class="summary-item"><span class="label">OFF</span><span class="value red" id="s-off">—</span></div>
            <div class="summary-item"><span class="label">Warnings (ΔV&gt;1)</span><span class="value amber" id="s-warn">—</span></div>
            <div class="summary-item"><span class="label">Crates</span><span class="value" id="s-crates">—</span></div>
        </div>
        <div id="filter-bar">
            <div class="search-wrap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search" placeholder="Search crate, slot, name…">
            </div>
            <div class="chip-group" id="status-chips">
                <button class="chip active" data-filter="all">ALL</button>
                <button class="chip on-chip" data-filter="on">ON</button>
                <button class="chip off-chip" data-filter="off">OFF</button>
                <button class="chip" data-filter="warn">⚠ ΔV</button>
            </div>
            <div class="chip-group" id="crate-chips"></div>
            <span class="spacer"></span>
            <label id="poll-label">Poll <span id="poll-val">3.0</span>s</label>
            <input type="range" id="poll-slider" min="1" max="15" step="0.5" value="3">
        </div>
        <div id="table-wrap">
            <table>
                <thead><tr>
                    <th data-col="on">⏻</th>
                    <th data-col="crate">Crate <span class="sort-arrow">▲</span></th>
                    <th data-col="slot">Slot <span class="sort-arrow">▲</span></th>
                    <th data-col="channel">Ch <span class="sort-arrow">▲</span></th>
                    <th data-col="model">Model <span class="sort-arrow">▲</span></th>
                    <th data-col="name">Name <span class="sort-arrow">▲</span></th>
                    <th data-col="vmon">VMon (V) <span class="sort-arrow">▲</span></th>
                    <th data-col="vset">VSet (V) <span class="sort-arrow">▲</span></th>
                    <th data-col="diff">ΔV <span class="sort-arrow">▲</span></th>
                    <th>Pwr</th>
                </tr></thead>
                <tbody id="ch-body"></tbody>
            </table>
        </div>
    </div>

    <!-- ═══════════════ GEOMETRY TAB ═══════════════ -->
    <div class="tab-content" id="geo-tab">
        <div id="geo-toolbar">
            <label>Color by:</label>
            <select id="geo-color-mode">
                <option value="vmon">VMon</option>
                <option value="vset">VSet</option>
                <option value="diff" selected>|VMon − VSet|</option>
                <option value="status">ON / OFF</option>
            </select>
            <div id="geo-legend">
                <span class="leg-label" id="leg-lo">0</span>
                <canvas id="leg-bar" class="leg-bar" width="180" height="10"></canvas>
                <span class="leg-label" id="leg-hi">—</span>
            </div>
            <span style="flex:1"></span>
            <input type="text" id="geo-search" placeholder="Search module…">
            <button class="btn" id="geo-reset">⊞ Reset View</button>
        </div>
        <div id="geo-container">
            <div id="geo-canvas-wrap">
                <canvas id="geo-canvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <span id="last-update">Waiting for data…</span>
        <span id="row-count"></span>
    </footer>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════

//  Global state

let hvMonitor    = null;
let allChannels  = [];
let sortCol      = 'crate';
let sortAsc      = true;
let filterStatus = 'all';
let filterCrate  = null;
let searchText   = '';

// Geometry map state
let geoTransform = { x: 0, y: 0, scale: 1 };
let geoDrag      = null;

let chByName = {};

// ═════════════════════════════════════════════════════════════════════
//  QWebChannel bootstrap
// ═════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    new QWebChannel(qt.webChannelTransport, channel => {
        hvMonitor = channel.objects.hvMonitor;
        hvMonitor.channelsUpdated.connect(jsonStr => {
            allChannels = JSON.parse(jsonStr);
            rebuildChMap();
            renderActiveTab();
        });
        hvMonitor.readAll(jsonStr => {
            allChannels = JSON.parse(jsonStr);
            rebuildChMap();
            populateCrateChips();
            renderActiveTab();
            document.getElementById('loading').classList.add('hidden');
            setPillConnected(true);
        });
    });

    initTableUI();
    initTabs();
    initGeoMap();
});

function rebuildChMap() {
    chByName = {};
    allChannels.forEach(ch => { chByName[ch.name] = ch; });
}

function renderActiveTab() {
    const active = document.querySelector('.tab-content.active');
    if (active.id === 'table-tab') renderTable();
    else if (active.id === 'geo-tab') renderGeo();
    updateFooter();
}

// ═════════════════════════════════════════════════════════════════════
//  TABS
// ═════════════════════════════════════════════════════════════════════
function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
            renderActiveTab();
            if (btn.dataset.tab === 'geo-tab') {
                resizeGeoCanvas();
                resetGeoView();
            }
        });
    });
}

// ═════════════════════════════════════════════════════════════════════
//  TABLE TAB (original logic)
// ═════════════════════════════════════════════════════════════════════
function initTableUI() {
    document.getElementById('btn-refresh').addEventListener('click', () => {
        if (!hvMonitor) return;
        hvMonitor.readAll(jsonStr => {
            allChannels = JSON.parse(jsonStr);
            rebuildChMap();
            renderActiveTab();
        });
    });
    document.getElementById('search').addEventListener('input', e => {
        searchText = e.target.value.trim().toLowerCase();
        renderTable();
    });
    document.getElementById('poll-slider').addEventListener('input', e => {
        const sec = parseFloat(e.target.value);
        document.getElementById('poll-val').textContent = sec.toFixed(1);
        if (hvMonitor) hvMonitor.setPollInterval(Math.round(sec * 1000));
    });
    document.querySelectorAll('#status-chips .chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('#status-chips .chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            filterStatus = chip.dataset.filter;
            renderTable();
        });
    });
    document.querySelectorAll('thead th[data-col]').forEach(th => {
        th.addEventListener('click', () => {
            const col = th.dataset.col;
            if (sortCol === col) sortAsc = !sortAsc;
            else { sortCol = col; sortAsc = true; }
            document.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted'));
            th.classList.add('sorted');
            th.querySelector('.sort-arrow').textContent = sortAsc ? '▲' : '▼';
            renderTable();
        });
    });
}

function populateCrateChips() {
    const crates = [...new Set(allChannels.map(c => c.crate))].sort();
    const wrap = document.getElementById('crate-chips');
    wrap.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'chip active'; allChip.dataset.crate = ''; allChip.textContent = 'All Crates';
    allChip.addEventListener('click', () => selectCrateChip(allChip, null));
    wrap.appendChild(allChip);
    crates.forEach(name => {
        const chip = document.createElement('button');
        chip.className = 'chip'; chip.dataset.crate = name;
        chip.textContent = name.replace('PRadHV_', 'HV');
        chip.addEventListener('click', () => selectCrateChip(chip, name));
        wrap.appendChild(chip);
    });
}

function selectCrateChip(chip, name) {
    document.querySelectorAll('#crate-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filterCrate = name;
    renderTable();
}

function renderTable() {
    let data = allChannels.slice();
    if (filterStatus === 'on')   data = data.filter(c => c.on);
    if (filterStatus === 'off')  data = data.filter(c => !c.on);
    if (filterStatus === 'warn') data = data.filter(c => Math.abs(c.vmon - c.vset) > 1);
    if (filterCrate)             data = data.filter(c => c.crate === filterCrate);
    if (searchText)              data = data.filter(c =>
        (c.crate+' '+c.slot+' '+c.channel+' '+c.name+' '+c.model).toLowerCase().includes(searchText));
    data.sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (sortCol === 'diff') { va = Math.abs(a.vmon - a.vset); vb = Math.abs(b.vmon - b.vset); }
        if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        if (typeof va === 'boolean') { va = va?1:0; vb = vb?1:0; }
        return sortAsc ? va - vb : vb - va;
    });
    const tbody = document.getElementById('ch-body');
    tbody.innerHTML = data.map(ch => {
        const diff = Math.abs(ch.vmon - ch.vset);
        const dcls = diff < 0.5 ? 'diff-ok' : diff < 2 ? 'diff-warn' : 'diff-bad';
        const onCls = ch.on ? 'on' : 'off';
        return `<tr>
            <td><span class="status-dot ${onCls}"></span></td>
            <td title="${ch.ip}">${ch.crate}</td><td>${ch.slot}</td><td>${ch.channel}</td>
            <td>${ch.model||'—'}</td><td>${ch.name||'—'}</td>
            <td style="text-align:right">${ch.vmon.toFixed(2)}</td>
            <td style="text-align:right">${ch.vset.toFixed(2)}</td>
            <td class="${dcls}" style="text-align:right">${diff.toFixed(2)}</td>
            <td style="text-align:center">
                <button class="pwr-btn ${onCls}"
                    onclick="togglePower('${ch.crate}',${ch.slot},${ch.channel},${ch.on?'false':'true'})"
                >${ch.on?'ON':'OFF'}</button>
            </td></tr>`;
    }).join('');

    // Summary
    const total = allChannels.length;
    const onCnt = allChannels.filter(c => c.on).length;
    const warns = allChannels.filter(c => Math.abs(c.vmon - c.vset) > 1).length;
    const nCr   = new Set(allChannels.map(c => c.crate)).size;
    document.getElementById('s-total').textContent  = total;
    document.getElementById('s-on').textContent     = onCnt;
    document.getElementById('s-off').textContent    = total - onCnt;
    document.getElementById('s-warn').textContent   = warns;
    document.getElementById('s-crates').textContent = nCr;
}

function updateFooter() {
    document.getElementById('last-update').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    document.getElementById('row-count').textContent =
        `${allChannels.length} channels | ${MODULES.length} modules`;
}

function togglePower(crate, slot, channel, on) {
    if (!hvMonitor) return;
    hvMonitor.setChannelPower(crate, slot, channel, on);
    const ch = allChannels.find(c => c.crate===crate && c.slot===slot && c.channel===channel);
    if (ch) ch.on = on;
    renderActiveTab();
}

function setPillConnected(ok) {
    const pill = document.getElementById('conn-pill');
    const text = document.getElementById('conn-text');
    if (ok) { pill.classList.remove('disconnected'); text.textContent = 'live'; }
    else    { pill.classList.add('disconnected');    text.textContent = 'disconnected'; }
}

// ═════════════════════════════════════════════════════════════════════
//  GEOMETRY MAP TAB
// ═════════════════════════════════════════════════════════════════════

function initGeoMap() {
    geoCanvas = document.getElementById('geo-canvas');
    geoCtx    = geoCanvas.getContext('2d');
    geoWrap   = document.getElementById('geo-canvas-wrap');

    // Pan
    geoWrap.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        geoDrag = { sx: e.clientX, sy: e.clientY, ox: geoTransform.x, oy: geoTransform.y };
    });
    window.addEventListener('mousemove', e => {
        if (geoDrag) {
            geoTransform.x = geoDrag.ox + (e.clientX - geoDrag.sx);
            geoTransform.y = geoDrag.oy + (e.clientY - geoDrag.sy);
            renderGeo();
        }
        updateGeoHover(e);
    });
    window.addEventListener('mouseup', () => { geoDrag = null; });

    // Zoom
    geoWrap.addEventListener('wheel', e => {
        e.preventDefault();
        const rect = geoWrap.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
        const ns = Math.max(0.15, Math.min(8, geoTransform.scale * factor));
        // zoom toward cursor
        geoTransform.x = mx - (mx - geoTransform.x) * (ns / geoTransform.scale);
        geoTransform.y = my - (my - geoTransform.y) * (ns / geoTransform.scale);
        geoTransform.scale = ns;
        renderGeo();
    }, { passive: false });

    // Click -> popup
    geoWrap.addEventListener('click', e => {
        if (geoDrag && (Math.abs(e.clientX - geoDrag?.sx) > 4 || Math.abs(e.clientY - geoDrag?.sy) > 4)) return;
        const mod = hitTestGeo(e);
        if (mod) openModPopup(mod);
    });

    // Hover tooltip
    geoWrap.addEventListener('mouseleave', () => {
        geoHover = null;
        document.getElementById('geo-tooltip').style.display = 'none';
    });

    // Color mode
    document.getElementById('geo-color-mode').addEventListener('change', () => {
        drawGeoLegend();
        renderGeo();
    });

    // Search
    document.getElementById('geo-search').addEventListener('input', e => {
        geoHighlight = e.target.value.trim().toUpperCase();
        renderGeo();
    });

    // Reset
    document.getElementById('geo-reset').addEventListener('click', () => { resetGeoView(); });

    // Popup
    document.getElementById('popup-close').addEventListener('click', closeModPopup);
    document.getElementById('mod-popup-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModPopup();
    });
    document.getElementById('popup-set-v').addEventListener('click', popupSetVoltage);
    document.getElementById('popup-turn-on').addEventListener('click', () => popupSetPower(true));
    document.getElementById('popup-turn-off').addEventListener('click', () => popupSetPower(false));

    // Resize observer
    new ResizeObserver(() => { resizeGeoCanvas(); renderGeo(); }).observe(geoWrap);

    drawGeoLegend();
}

function resizeGeoCanvas() {
    const rect = geoWrap.getBoundingClientRect();
    geoCanvas.width  = rect.width  * devicePixelRatio;
    geoCanvas.height = rect.height * devicePixelRatio;
    geoCanvas.style.width  = rect.width + 'px';
    geoCanvas.style.height = rect.height + 'px';
    geoCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function resetGeoView() {
    const rect = geoWrap.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    // Fit all modules: x ∈ [-563, 563], y ∈ [-563, 563]
    const extent = 600; // half-width in mm, with margin
    const scaleX = rect.width  / (2 * extent);
    const scaleY = rect.height / (2 * extent);
    geoTransform.scale = Math.min(scaleX, scaleY) * 0.92;
    geoTransform.x = rect.width  / 2;
    geoTransform.y = rect.height / 2;
    renderGeo();
}

// ── Color helpers ────────────────────────────────────────────────────
function geoColorMode() { return document.getElementById('geo-color-mode').value; }

function moduleColor(mod) {
    const ch = chByName[mod.n];
    const mode = geoColorMode();

    if (mode === 'status') {
        if (!ch) return '#222';
        return ch.on ? '#2dd4a0' : '#993333';
    }

    if (!ch) return '#222';

    if (mode === 'vmon') {
        const maxV = 2100;
        const t = Math.min(1, Math.max(0, Math.abs(ch.vmon) / maxV));
        return vmonColorScale(t);
    }

    if (mode === 'vset') {
        const maxV = 2100;
        const t = Math.min(1, Math.max(0, Math.abs(ch.vset) / maxV));
        return vmonColorScale(t);
    }

    // mode === 'diff'
    const diff = Math.abs(ch.vmon - ch.vset);
    if (diff < 0.2)  return '#1a5c44';  // excellent: dark green
    if (diff < 1)    return '#2dd4a0';  // good: green
    if (diff < 3)    return '#eab308';  // warning: amber
    if (diff < 10)   return '#f56565';  // bad: red
    return '#ff2222';                   // very bad: bright red
}

function vmonColorScale(t) {
    // 0 -> #0b1628 (off/dark), 0.5 -> #3b9eff (blue), 1.0 -> #eab308 (amber)
    if (t < 0.5) {
        const u = t * 2;
        return lerpColor('#0b1628', '#3b9eff', u);
    } else {
        const u = (t - 0.5) * 2;
        return lerpColor('#3b9eff', '#eab308', u);
    }
}

function lerpColor(a, b, t) {
    const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
    const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
    const r = Math.round(ar + (br-ar)*t), g = Math.round(ag + (bg-ag)*t), bl = Math.round(ab + (bb-ab)*t);
    return `rgb(${r},${g},${bl})`;
}

function drawGeoLegend() {
    const canvas = document.getElementById('leg-bar');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    const mode = geoColorMode();

    if (mode === 'status') {
        // simple two-color
        ctx.fillStyle = '#993333'; ctx.fillRect(0, 0, w/2, h);
        ctx.fillStyle = '#2dd4a0'; ctx.fillRect(w/2, 0, w/2, h);
        document.getElementById('leg-lo').textContent = 'OFF';
        document.getElementById('leg-hi').textContent = 'ON';
    } else if (mode === 'vmon' || mode === 'vset') {
        for (let i = 0; i < w; i++) {
            ctx.fillStyle = vmonColorScale(i / w);
            ctx.fillRect(i, 0, 1, h);
        }
        document.getElementById('leg-lo').textContent = '0 V';
        document.getElementById('leg-hi').textContent = '2100 V';
    } else {
        // diff: green -> amber -> red
        const stops = [ [0,'#1a5c44'], [0.15,'#2dd4a0'], [0.4,'#eab308'], [0.7,'#f56565'], [1,'#ff2222'] ];
        const grad = ctx.createLinearGradient(0,0,w,0);
        stops.forEach(([s,c]) => grad.addColorStop(s,c));
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        document.getElementById('leg-lo').textContent = '0 V';
        document.getElementById('leg-hi').textContent = '10+ V';
    }
}

// ── Rendering ────────────────────────────────────────────────────────
function renderGeo() {
    if (!geoCanvas.width) return;
    const ctx = geoCtx;
    const W = geoCanvas.width / devicePixelRatio;
    const H = geoCanvas.height / devicePixelRatio;
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    ctx.translate(geoTransform.x, geoTransform.y);
    ctx.scale(geoTransform.scale, -geoTransform.scale); // flip Y for physics coords

    const gap = 0.4; // mm gap between modules for visual separation

    for (let i = 0; i < MODULES.length; i++) {
        const m = MODULES[i];
        const hw = m.sx / 2 - gap;
        const hh = m.sy / 2 - gap;

        const isHover = (geoHover === m.n);
        const isSearch = geoHighlight && m.n.toUpperCase().includes(geoHighlight);
        const noMatch = geoHighlight && !isSearch;

        ctx.fillStyle = noMatch ? 'rgba(20,28,38,0.6)' : moduleColor(m);
        ctx.fillRect(m.x - hw, m.y - hh, hw * 2, hh * 2);

        if (isHover || isSearch) {
            ctx.strokeStyle = isHover ? '#fff' : '#3b9eff';
            ctx.lineWidth = 1.5 / geoTransform.scale;
            ctx.strokeRect(m.x - hw, m.y - hh, hw * 2, hh * 2);
        }
    }

    // Draw axis cross at center
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1 / geoTransform.scale;
    ctx.beginPath();
    ctx.moveTo(-600, 0); ctx.lineTo(600, 0);
    ctx.moveTo(0, -600); ctx.lineTo(0, 600);
    ctx.stroke();

    ctx.restore();

    // Labels at high zoom
    if (geoTransform.scale > 2.2) {
        ctx.save();
        ctx.translate(geoTransform.x, geoTransform.y);
        const s = geoTransform.scale;
        const fontSize = Math.max(4, Math.min(9, 6));
        ctx.font = `${fontSize / s}px JetBrains Mono, monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        for (const m of MODULES) {
            // only draw labels that are within viewport
            const sx = m.x * s, sy = -m.y * s;
            if (sx < -geoTransform.x - 100 || sx > -geoTransform.x + geoCanvas.width/devicePixelRatio + 100) continue;
            if (sy < -geoTransform.y - 100 || sy > -geoTransform.y + geoCanvas.height/devicePixelRatio + 100) continue;
            ctx.save();
            ctx.scale(s, -s);
            ctx.fillText(m.n, m.x, -m.y);
            ctx.restore();
        }
        ctx.restore();
    }
}

// ── Hit testing ──────────────────────────────────────────────────────
function screenToWorld(e) {
    const rect = geoWrap.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    return {
        x: (sx - geoTransform.x) / geoTransform.scale,
        y: -(sy - geoTransform.y) / geoTransform.scale   // flip Y
    };
}

function hitTestGeo(e) {
    const w = screenToWorld(e);
    for (let i = MODULES.length - 1; i >= 0; i--) {
        const m = MODULES[i];
        const hw = m.sx / 2, hh = m.sy / 2;
        if (w.x >= m.x - hw && w.x <= m.x + hw && w.y >= m.y - hh && w.y <= m.y + hh)
            return m;
    }
    return null;
}

function updateGeoHover(e) {
    if (!document.getElementById('geo-tab').classList.contains('active')) return;
    const mod = hitTestGeo(e);
    const tooltip = document.getElementById('geo-tooltip');
    if (mod) {
        if (geoHover !== mod.n) {
            geoHover = mod.n;
            renderGeo();
        }
        const ch = chByName[mod.n];
        let html = `<div class="tt-name">${mod.n}</div>`;
        html += `<div class="tt-row"><span class="tt-label">Type</span><span class="tt-val">${mod.t}</span></div>`;
        if (ch) {
            html += `<div class="tt-row"><span class="tt-label">Crate</span><span class="tt-val">${ch.crate} s${ch.slot} ch${ch.channel}</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">VMon</span><span class="tt-val">${ch.vmon.toFixed(2)} V</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">VSet</span><span class="tt-val">${ch.vset.toFixed(2)} V</span></div>`;
            const diff = Math.abs(ch.vmon - ch.vset);
            html += `<div class="tt-row"><span class="tt-label">ΔV</span><span class="tt-val">${diff.toFixed(2)} V</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">Status</span><span class="${ch.on?'tt-on':'tt-off'}">${ch.on?'ON':'OFF'}</span></div>`;
        } else {
            html += `<div class="tt-row"><span class="tt-label">HV</span><span class="tt-val" style="color:var(--text-dim)">not linked</span></div>`;
        }
        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY + 14) + 'px';
    } else {
        if (geoHover) { geoHover = null; renderGeo(); }
        tooltip.style.display = 'none';
    }
}

// ── Module popup (click) ─────────────────────────────────────────────
let popupMod = null;

function openModPopup(mod) {
    popupMod = mod;
    const ch = chByName[mod.n];
    document.getElementById('popup-title').textContent = mod.n;

    const grid = document.getElementById('popup-grid');
    let html = '';
    html += `<span class="plbl">Type</span><span class="pval">${mod.t}</span>`;
    html += `<span class="plbl">Position</span><span class="pval">(${mod.x.toFixed(1)}, ${mod.y.toFixed(1)}) mm</span>`;
    html += `<span class="plbl">Size</span><span class="pval">${mod.sx} × ${mod.sy} mm</span>`;
    if (ch) {
        html += `<span class="plbl">Crate</span><span class="pval">${ch.crate}</span>`;
        html += `<span class="plbl">Slot / Ch</span><span class="pval">${ch.slot} / ${ch.channel}</span>`;
        html += `<span class="plbl">Model</span><span class="pval">${ch.model || '—'}</span>`;
        html += `<span class="plbl">VMon</span><span class="pval">${ch.vmon.toFixed(2)} V</span>`;
        html += `<span class="plbl">VSet</span><span class="pval">${ch.vset.toFixed(2)} V</span>`;
        html += `<span class="plbl">ΔV</span><span class="pval">${Math.abs(ch.vmon-ch.vset).toFixed(2)} V</span>`;
        html += `<span class="plbl">Status</span><span class="pval" style="color:${ch.on?'var(--green)':'var(--red)'}">${ch.on?'ON':'OFF'}</span>`;
        document.getElementById('popup-vset').value = ch.vset.toFixed(1);
    } else {
        html += `<span class="plbl">HV</span><span class="pval" style="color:var(--text-dim)">No linked channel</span>`;
        document.getElementById('popup-vset').value = '';
    }
    grid.innerHTML = html;

    const hasChannel = !!ch;
    document.getElementById('popup-vset').disabled    = !hasChannel;
    document.getElementById('popup-set-v').disabled    = !hasChannel;
    document.getElementById('popup-turn-on').disabled   = !hasChannel;
    document.getElementById('popup-turn-off').disabled  = !hasChannel;

    document.getElementById('mod-popup-overlay').classList.add('visible');
}

function closeModPopup() {
    document.getElementById('mod-popup-overlay').classList.remove('visible');
    popupMod = null;
}

function popupSetVoltage() {
    if (!popupMod || !hvMonitor) return;
    const ch = chByName[popupMod.n];
    if (!ch) return;
    const v = parseFloat(document.getElementById('popup-vset').value);
    if (isNaN(v)) return;
    hvMonitor.setChannelVoltage(ch.crate, ch.slot, ch.channel, v);
    ch.vset = v;
    openModPopup(popupMod); // refresh display
}

function popupSetPower(on) {
    if (!popupMod || !hvMonitor) return;
    const ch = chByName[popupMod.n];
    if (!ch) return;
    hvMonitor.setChannelPower(ch.crate, ch.slot, ch.channel, on);
    ch.on = on;
    openModPopup(popupMod); // refresh display
}
